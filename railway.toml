[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"
watchPatterns = ["**/*.php", "composer.json", "composer.lock", "Dockerfile", "scripts/**"]

[deploy]
restartPolicyType = "ON_FAILURE"
startCommand = "bash scripts/railway-start.sh"

[variables]
APP_ENV = "production"
APP_DEBUG = "false"
APP_URL = "https://garden-production-1bb1.up.railway.app"
DB_CONNECTION = "sqlite"
LOG_CHANNEL = "errorlog"
SESSION_DRIVER = "cookie"
CACHE_DRIVER = "array"
